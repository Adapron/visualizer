<!DOCTYPE html>
<head>
    <style>
        .list-holder{
            display: flex;
            flex-direction: row;
            align-items: center;
        }
        .node{
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid black;
            padding: 10px;
            margin: 5px;
        }
        .node .address{
            font-size: 12px;
            color: gray;
        }
        .node .value{
            font-size: 20px;
            font-weight: bold;
        }
        .node .pointer{
            width: 40px;
            height: 20px;
            border: 1px solid black;
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: gray;
        }
        .arrow-svg{
            z-index: 999;
        }

        .pseudocode {
            font-family: monospace;
            background-color: #f0f0f0;
            padding: 10px;
            border: 1px solid #ccc;
            margin-top: 20px;
            white-space: pre;
        }

        .pseudocode .line {
            padding: 2px 5px;
        }
    </style>
</head>

<body>
    <div id="controls">
        <label>autoplay</label>
        <input type="checkbox" onchange ="toggleAutoplay()" id="autoplay">
        <button id="step" onclick="step()">step</button>
    </div>

    <div class="list-holder" id="pointers">
    </div>
    <div class="list-holder" id="holder">
    </div>
    <div class="list-holder" id="result">

    </div>
    <div class="pseudocode">
    </div>
</body>

<script>
    const pseudocode = `
    start = head
    while start is not null:
        minNode = start
        current = start.next
        while current is not null:
            if current.value < minNode.value:
                minNode = current
            current = current.next
        swap start and minNode
        // (swap the visual elements so its not tangled)
        start = start.next

    done
    `;

    function writePseudocode(str){
        const pseudocodeDiv = document.querySelector('.pseudocode');
        const lines = str.split('\n');
        lines.forEach(line => {
            const lineDiv = document.createElement('div');
            lineDiv.classList.add('line');
            lineDiv.textContent = line;
            pseudocodeDiv.appendChild(lineDiv);
        });
    }
    function drawArrow(from, to) {
        // draws an arrow from 'from' element to 'to' element
        const fromRect = from.getBoundingClientRect();
        const toRect = to.getBoundingClientRect();

        const startX = fromRect.right + window.scrollX;
        const startY = fromRect.top + fromRect.height / 2 + window.scrollY;
        const endX = toRect.left + window.scrollX;
        const endY = toRect.top + toRect.height / 2 + window.scrollY;

        const left = Math.min(startX, endX);
        const top = Math.min(startY, endY);
        const width = Math.max(Math.abs(endX - startX), 1);
        const height = Math.max(Math.abs(endY - startY), 1);

        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.style.position = "absolute";
        svg.style.left = `${left}px`;
        svg.style.top = `${top}px`;
        svg.style.width = `${width}px`;
        svg.style.height = `${height}px`;
        svg.style.overflow = "visible";
        svg.style.pointerEvents = "none";
        svg.classList.add("arrow-svg");

        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", `${startX - left}`);
        line.setAttribute("y1", `${startY - top}`);
        line.setAttribute("x2", `${endX - left}`);
        line.setAttribute("y2", `${endY - top}`);
        line.setAttribute("stroke", "black");
        line.setAttribute("stroke-width", "2");
        line.setAttribute("marker-end", "url(#arrowhead)");
        svg.appendChild(line);

        const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
        const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
        marker.setAttribute("id", "arrowhead");
        marker.setAttribute("markerWidth", "10");
        marker.setAttribute("markerHeight", "7");
        marker.setAttribute("refX", "10");
        marker.setAttribute("refY", "3.5");
        marker.setAttribute("orient", "auto");
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", "M0,0 L10,3.5 L0,7 Z");
        path.setAttribute("fill", "black");
        marker.appendChild(path);
        defs.appendChild(marker);
        svg.appendChild(defs);
        // delete last arrow if exists
        const existingArrow = from.querySelector('.arrow-svg');
        if (existingArrow) {
            existingArrow.remove();
        }
        from.appendChild(svg);
    }

    var values = [25, 10, 15, 5, 20];
    var node_elements = [];

    let highlightednode = null;

    class Node {
        constructor(value, address) {
            this.value = value;
            this.address = address;
            this.next = null;
            this.element = this.createElement();
        }

        createElement() {
            const node = document.createElement('div');
            node.classList.add('node');

            const addressDiv = document.createElement('div');
            addressDiv.classList.add('address');
            addressDiv.textContent = this.address;
            node.appendChild(addressDiv);

            const valueDiv = document.createElement('div');
            valueDiv.classList.add('value');
            valueDiv.textContent = this.value;
            node.appendChild(valueDiv);

            const pointerDiv = document.createElement('div');
            pointerDiv.classList.add('pointer');
            pointerDiv.textContent = 'null';
            node.appendChild(pointerDiv);

            return node;
        }

        setNext(node) {
            this.next = node;
            this.element.querySelector('.pointer').textContent = node ? node.address : 'null';
            if (node) {
                console.log(`Drawing arrow from ${this.address} to ${node.address}`);
                // schedule because dom might not be fully rendered yet
                setTimeout(() => {
                drawArrow(this.element.querySelector('.pointer'), node.element.querySelector('.address'));
                }, 100);
            }
        }


        free() {
            this.setNext(null);
            this.element.querySelector('.value').textContent = 'freed';
            this.element.style.backgroundColor = 'lightgray';
            this.element.style.border = '1px solid black';

        }

        highlight() {
            if (highlightednode) {
                highlightednode.getElement().style.backgroundColor = '';
                highlightednode.getElement().style.border = '1px solid black';
            }
            this.element.style.backgroundColor = 'lightblue';
            this.element.style.border = '2px solid blue';
            highlightednode = this;
        }

        getElement() {
            return this.element;
        }

        getValue() {
            return this.value;
        }

        getNext() {
            return this.next;
        }

        setValue(value) {
            this.value = value;
            this.element.querySelector('.value').textContent = value;
        }
    }

    function highlightPseudocodeLine(lineNumber) {
        const lines = document.querySelectorAll('.pseudocode .line');
        lines.forEach((line, index) => {
            if (index === lineNumber) {
                line.style.backgroundColor = 'yellow';
            } else {
                line.style.backgroundColor = '';
            }
        });
    }

    highlightPseudocodeLine(0); // Highlight the first line initially

    function createLinkedList(values, startAddress = 0) {
        let start = new Node('Start', '0x'+startAddress.toString().padStart(3, '0'));
        let head = null;
        let prevNode = null;
        var allNodes = []

        values.forEach((value, index) => {
            const node = new Node(value, `0x${(index + 1+startAddress).toString().padStart(3, '0')}`);
            allNodes.push(node);
            if (!head) {
                head = node;
            }
            if (prevNode) {
                prevNode.setNext(node);
            }
            prevNode = node;
        });
        start.setNext(head);
        allNodes.unshift(start);

        return allNodes;
    }
    node_elements = createLinkedList(values);
    const listHolder = document.getElementById('holder');
    node_elements.forEach(node => {
        listHolder.appendChild(node.getElement());
    });

    let resultElements = createLinkedList([], 100); // empty list for results
    const resultHolder = document.getElementById('result');
    resultElements.forEach(node => {
        resultHolder.appendChild(node.getElement());
    });

    let pointers = [];
    pointers.push(new Node("Min", "0x999"));
    pointers.push(new Node("Current", "0x998"));
    pointers.push(new Node("Before Min", "0x997"));
    pointers.push(new Node("Lagging", "0x996"));


    let minNode = pointers[0]
    let currentNode = pointers[1]
    let beforeMinNode = pointers[2]
    let laggingNode = pointers[3]
        const pointerHolder = document.getElementById("pointers");
    pointers.forEach(pointer => {
        pointerHolder.appendChild(pointer.getElement());
    })

    const delay = ms => new Promise(resolve => setTimeout(resolve, ms));
    var autoplay = false
var waitingResolve = null
var waitingForTimeout = null

function toggleAutoplay(){
    if (autoplay){
        autoplay = false
        clearTimeout(waitingForTimeout)
    } else {
        autoplay = true
        if (waitingResolve){
            waitingForTimeout = setTimeout(() => {
                waitingResolve()
            }, 500)
        }
    }
}

function step(){
    if (waitingResolve){
        waitingResolve()
    }
}

function betterDelay(mult = 1){
    console.log("making a new promise")
    return new Promise(resolve => {
        waitingResolve = resolve

        if (autoplay){
            console.log("adding a timeout")
            waitingForTimeout = setTimeout(() => {
                console.log("resolving that promise")
                waitingResolve()
            }, 500 * mult)
        }
    })
}

    async function betterSelectSortIteration(headA, headB){
        if (!headA.next) {
            return;
        }
        // pick smallest
        let min = headA.next;
        minNode.setNext(min);
        highlightPseudocodeLine(3);
        await betterDelay(1);

        let lagging = headA; // the node before current, used for popping min later
        laggingNode.setNext(lagging)
        highlightPseudocodeLine(4);
        await betterDelay(1)

        let beforeMin = headA; // the node before min, used for swapping min later
        beforeMinNode.setNext(beforeMin)
        highlightPseudocodeLine(5);
        await betterDelay(1)


        let current = headA.next.next;
        currentNode.setNext(current);
        highlightPseudocodeLine(6);
        await betterDelay(1);
        while (current) {
            highlightPseudocodeLine(7);
            await betterDelay(1);
            highlightPseudocodeLine(8);
            await betterDelay(1);
            if (current.value < min.value) {
                min = current;
                minNode.setNext(min);
                highlightPseudocodeLine(9);
                await betterDelay(1);

                beforeMin = lagging.next;
                beforeMinNode.setNext(beforeMin)
                highlightPseudocodeLine(10);
                await betterDelay(1)
            }
            lagging = lagging.next;
            laggingNode.setNext(lagging);
            highlightPseudocodeLine(11);
            await betterDelay(1);
            current = current.next;
            currentNode.setNext(current);
            highlightPseudocodeLine(12);
            await betterDelay(1);
        }

        // now we have min, pop it from list A and push it to list B
        beforeMin.setNext(min.next); // pop min
        highlightPseudocodeLine(13);
        await betterDelay(1);
        min.setNext(headB.next); // push min to head of B
        highlightPseudocodeLine(14);
        await betterDelay(1);
        headB.setNext(min);
        highlightPseudocodeLine(15);
        await betterDelay(1);

        // for clarity move the visual element of min to the result list
        console.log("result children: ", resultHolder.childNodes)
        console.log("inserting before child: ", resultHolder.firstChild.nextSibling.nextSibling)
        resultHolder.insertBefore(min.getElement(), resultHolder.firstChild.nextSibling.nextSibling);
        // redraw all arrows
        node_elements.forEach(node => {
            if (node.getNext()) {
                node.setNext(node.getNext()); // this will redraw the arrow
            }
        });
        headB.setNext(headB.getNext());
        pointers.forEach(pointer => {
            if (pointer.getNext()) {
                pointer.setNext(pointer.getNext()); // redraw pointer arrows
            }
        });

        highlightPseudocodeLine(16);
        await betterDelay(1);


    }

    const betterPseudocode = `
    headB = new empty list
    while headA->next is not null:
        min = headA->next
        lagging = headA
        beforeMin = headA
        current = headA->next->next
        while current is not null:
            if current.value < min.value:
                min = current
                beforeMin = lagging->next
            lagging = lagging->next
            current = current->next
        beforeMin->next = min->next // pop min from list A
        min->next = headB->next // push min to head of B
        headB->next = min
        // update visual arrangement by moving newly appended node down
    done

    
    `

    async function selectSortIteration(list, start){
        const first = start.getNext();
        if (!first) {
            return null;
        }

        let minNode = first;
        highlightPseudocodeLine(3);
        let current = first.getNext();
        await betterDelay(1); // wait for a moment to show the highlight
        highlightPseudocodeLine(4);

        let predecessor_of_minNode = start; // keeps track of the node before minNode for swapping

        let tries = 0; // safety to prevent infinite loops in case of bugs
        while (current) {
            tries++;
            if (tries > 100) {
                console.error("dumbass has infinite loop");
                break;
            }
            highlightPseudocodeLine(6);
                current.highlight()

            await betterDelay(1)
            if (current.getValue() < minNode.getValue()) {
                predecessor_of_minNode = minNode;
                highlightPseudocodeLine(7);
                await betterDelay(1);
                minNode = current;
            }
            current = current.getNext();
            highlightPseudocodeLine(8);
            await betterDelay(1)
        }

        minNode.highlight();
        await betterDelay(2); // wait for a moment to show the highlight
        highlightPseudocodeLine(9);

        if (minNode !== first) {
            // Swap the two nodes by rewiring pointers, not values.
            const firstNext = first.getNext();
            const minNodeNext = minNode.getNext();

            start.setNext(minNode);
            predecessor_of_minNode.getNext().setNext(first);
            first.setNext(minNodeNext);
            if(firstNext !== minNode) {
                minNode.setNext(firstNext);
            }
        }


        await betterDelay(2); // wait for a moment to show the highlight
        // actually swapping the nodes in the DOM to reflect the new order after the swap
        const firstElement = first.getElement();
        const minNodeElement = minNode.getElement();
        const firstNextSibling = firstElement.nextSibling;  
        const minNodeNextSibling = minNodeElement.nextSibling;
        
        if (firstNextSibling === minNodeElement) {
            listHolder.insertBefore(minNodeElement, firstElement);
        } else if (minNodeNextSibling === firstElement) {
            listHolder.insertBefore(firstElement, minNodeElement);
        } else {
            listHolder.insertBefore(minNodeElement, firstNextSibling);
            listHolder.insertBefore(firstElement, minNodeNextSibling);
        }
        // redraw all arrows
        node_elements.forEach(node => {
            if (node.getNext()) {
                drawArrow(node.getElement().querySelector('.pointer'), node.getNext().getElement().querySelector('.address'));
            }
        });
        highlightPseudocodeLine(10);
        await betterDelay(1); // wait for a moment to show the highlight
        highlightPseudocodeLine(11);

        return start.getNext(); // new start of the unsorted portion
    }

    writePseudocode(betterPseudocode);
    async function selectSortAnim(){
        // we cheat, main thing is the animation.
        highlightPseudocodeLine(1);
        await betterDelay(1); // wait for a moment to show the highlight

        let currentStart = node_elements[0]; // start node
        for (let i = 0; i < values.length; i++) {
            highlightPseudocodeLine(2);
            await betterDelay(1);
            await betterSelectSortIteration(currentStart, resultElements[0]);
            
            await betterDelay(2); // wait for a moment to show the highlight
        }
        highlightPseudocodeLine(17);

        pointers.forEach(pointer => {
            pointer.free();
        });



    }

    selectSortAnim();
</script>
